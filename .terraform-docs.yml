formatter: markdown table

sections:
  show:
    - requirements
    - providers
    - resources
    - inputs
    - outputs

output:
  file: README.md
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

settings:
  anchor: true
  color: true
  escape: true
  html: true
  indent: 2
  lockfile: true
  required: true
  sensitive: true
  type: true

sort:
  enabled: true
  by: required
