name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changelog:
    name: Changelog
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Require changelog update for non-doc changes
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1

          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"

          echo "Changed files:"
          echo "$changed_files"

          if echo "$changed_files" | grep -qx 'CHANGELOG.md'; then
            exit 0
          fi

          if echo "$changed_files" | grep -Ev '^(CHANGELOG\.md|.*\.md)$' >/dev/null; then
            echo "ERROR: This pull request changes non-Markdown files but does not update CHANGELOG.md."
            echo "Add a changelog entry or limit the PR to docs-only changes."
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: "~1.11"

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate examples
        run: |
          for dir in examples/*/; do
            terraform -chdir="$dir" init -backend=false
            TF_VAR_compartment_id=ocid1.compartment.oc1..example \
            TF_VAR_region=us-phoenix-1 \
            TF_VAR_ssh_public_key="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICiKvExampleKey user@example" \
            terraform -chdir="$dir" validate
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: "~1.11"

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform test
        run: terraform test
